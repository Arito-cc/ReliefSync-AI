<svg width="24" height="24" viewBox="0 0 24 24" xmlns="http://www.w3.org/2000/svg">
  <g fill="#3B82F6">
    
    <!-- vertical ribbon -->
    <rect x="10.5" y="3" width="3" height="18" rx="1.5"/>

    <!-- horizontal ribbon -->
    <rect x="3" y="10.5" width="18" height="3" rx="1.5"/>

    <!-- diagonal ribbon 1 -->
    <rect x="10.5" y="3" width="3" height="18" rx="1.5"
          transform="rotate(45 12 12)"/>

    <!-- diagonal ribbon 2 -->
    <rect x="10.5" y="3" width="3" height="18" rx="1.5"
          transform="rotate(-45 12 12)"/>

  </g>
</svg>